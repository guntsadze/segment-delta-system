version: "3.8"

services:
  # --- ლოკალური მონაცემთა ბაზა (პაროლის გარეშე) ---
  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=segment_db
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- რიგების მენეჯერი (Redis) ---
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # --- ბექენდი (NestJS) ---
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres@postgres:5432/segment_db?schema=public&sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  # --- ფრონტენდი (Next.js) ---
  ui:
    build:
      context: ./apps/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
